html_content = """<!DOCTYPE html>

<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col">

                    日本語・拙い英語を入力
                </span>
                <span id="charCount">0 文字</span>
            </div>

            <textarea id="inputText" rows="3"

                placeholder="「これ英語でなんて言う？」や、直したい英文を入力するか、マイクボタンで話しかけてください..."></textarea>

            <div id="imagePreviewContainer" class="hidden relative rounded-xl overflow-hidden border border-slate-700 bg-slate-900 p-2">
                <img id="imagePreview" src="" class="max-h-40 w-auto mx-auto rounded-lg object-contain">
                <button id="removeImageBtn" class="absolute top-3 right-3 bg-red-600 hover:bg-red-700 text-white w-8 h-8 rounded-full flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-trash"></i>
                </button>

            <div class="flex justify-between items-center gap-2">
                <div class="flex items-center gap-2">
                    <label class="bg-slate-700 hover:bg-slate-600 text-slate-200 p-3 rounded-full cursor-pointer flex items-center justify-center w-11 h-11 transition border border-slate-600 shadow-sm" title="写真を撮る/アップロード">
                        <i class="fa-solid fa-camera text-cyan-400"></i>
                        <input type="file" id="imageInput" accept="image/*" capture="environment" class="hidden">
                    </label>
                    
                    <button id="clearBtn" class="bg-slate-700 hover:bg-slate-600 text-slate-200 p-3 rounded-full flex items-center justify-center w-11 h-11 transition border border-slate-600 shadow-sm" title="テキストを消去">
                        <i class="fa-solid fa-eraser"></i>
                    </button>

                <button id="voiceBtn" class="bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-white px-5 py-2.5 rounded-full flex items-center justify-center space-x-2 transition shadow-lg shadow-indigo-900/40 border border-indigo-400">

            <button id="submitBtn" class="w-full py-3.5 bg-gradient-to-r from-indigo-500 to-cyan-500 hover:from-indigo-600 hover:to-cyan-600 text-white rounded-xl font-bold text-sm shadow-md transition flex items-center justify-center space-x-2">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <span id="submitBtnText">英語フレーズに変換・解析する</span>
            </button>
        </div>

        <div id="toast" class="hidden bg-indigo-950 border border-indigo-800 text-indigo-300 text-xs rounded-xl p-3 text-center transition-all duration-300">
            通信中...
        </div>

        <div id="resultArea" class="hidden space-y-4">

            <div class="bg-slate-800 rounded-2xl p-4 border border-slate-700 shadow-md relative overflow-hidden group">
                <div class="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
                <div class="flex justify-between items-start mb-2">
                    <span class="text-xs font-bold text-emerald-400 bg-emerald-950 border border-emerald-900 px-2 py-0.5 rounded">日常・カジュアル</span>
                    <button class="speakBtn text-indigo-400 hover:text-indigo-300 p-2 rounded-full hover:bg-slate-700 transition" data-target="phraseCasual">
                        <i class="fa-solid fa-volume-high text-lg"></i>
                    </button>
                </div>
                <p id="phraseCasual" class="text-lg font-bold text-slate-100 select-all"></p>
            </div>

            <div class="bg-slate-800 rounded-2xl p-4 border border-slate-700 shadow-md relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-cyan-500"></div>
                <div class="flex justify-between items-start mb-2">
                    <span class="text-xs font-bold text-cyan-400 bg-cyan-950 border border-cyan-900 px-2 py-0.5 rounded">少し丁寧・ビジネス</span>
                    <button class="speakBtn text-indigo-400 hover:text-indigo-300 p-2 rounded-full hover:bg-slate-700 transition" data-target="phraseFormal">
                        <i class="fa-solid fa-volume-high text-lg"></i>
                    </button>
                </div>
                <p id="phraseFormal" class="text-lg font-bold text-slate-100 select-all"></p>
            </div>

            <div class="bg-slate-800 rounded-2xl p-4 border border-slate-700 shadow-md">
                <span class="text-xs font-bold text-indigo-400 bg-indigo-950 border border-indigo-900 px-2 py-0.5 rounded">ワンポイント解説</span>
                <p id="phraseExplanation" class="text-sm text-slate-300 mt-2 leading-relaxed"></p>
            </div>
        </div>

        <div id="historySection" class="space-y-3">
            <div class="flex justify-between items-center px-1">

                </h3>
                <button id="clearHistoryBtn" class="text-xs text-red-400 hover:text-red-300 flex items-center gap-1">
                    <i class="fa-solid fa-trash-can text-[10px]"></i> 履歴クリア
                </button>
            </div>
            <div id="historyList" class="space-y-2">
                <p id="emptyHistoryText" class="text-xs text-center text-slate-500 py-6">履歴はまだありません。フレーズを作成してスタートしましょう！</p>
            </div>
        </div>

    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-slate-800 border-t border-slate-700 p-3 shadow-2xl z-20">
        <div class="max-w-md mx-auto flex flex-col gap-2">
            <div class="flex bg-slate-950 rounded-xl p-0.5 border border-slate-700 text-xs font-bold">
                <button class="engineTab flex-1 py-2 rounded-lg transition text-center bg-indigo-600 text-white" data-engine="browser">
                    🌐 ブラウザ標準ボイス
                </button>
                <button class="engineTab flex-1 py-2 rounded-lg transition text-center text-slate-400" data-engine="gemini">
                    ✨ Gemini 超リアルAIボイス
                </button>
            </div>

            <div class="flex items-center justify-between gap-3">
                <div id="browserAccentContainer" class="flex bg-slate-900 rounded-lg p-0.5 border border-slate-700/60">
                    <button class="accentTab px-2.5 py-1.5 rounded-md text-[11px] font-bold transition bg-indigo-600 text-white" data-accent="en-US">🇺🇸 US</button>
                    <button class="accentTab px-2.5 py-1.5 rounded-md text-[11px] font-bold text-slate-400" data-accent="en-GB">🇬🇧 UK</button>
                </div>

                <div class="flex-1 flex items-center gap-1 bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5">
                    <i class="fa-solid fa-circle-user text-indigo-400 text-xs"></i>
                    <select id="voiceSelect" class="bg-transparent text-xs text-slate-200 focus:outline-none w-full cursor-pointer">
                        </select>
                </div>
            </div>
        </div>
    </div>

    <div id="apiKeyModal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-sm rounded-2xl p-6 shadow-2xl space-y-4">
            <div class="flex justify-between items-start">
                <div class="flex items-center space-x-2">
                    <i class="fa-solid fa-key text-yellow-400 text-lg"></i>
                    <h2 class="text-md font-bold text-slate-100">Gemini APIキーの登録</h2>
                </div>
                <button id="closeModalBtn" class="text-slate-400 hover:text-slate-200 p-1"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <p class="text-xs text-slate-400 leading-relaxed">
                キーはブラウザの内部（localStorage）にのみ保存され、外部サーバーへ直接送信されることはありません。
            </p>
            <input type="password" id="apiKeyInput" 
                class="w-full bg-slate-900 text-slate-100 rounded-xl p-3 border border-slate-700 focus:outline-none focus:border-indigo-500 text-sm" 
                placeholder="AI Studioから取得した AIzaSy... キーを入力">
            <div class="flex gap-2 justify-end pt-2">
                <button id="saveKeyBtn" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-4 py-2 rounded-xl transition">保存</button>
            </div>
        </div>
    </div>

    <script>
        // System State
        let apiKey = localStorage.getItem('gemini_api_key') || '';
        let currentEngine = 'browser'; // 'browser' or 'gemini'
        let currentAccent = 'en-US';   // 'en-US' or 'en-GB'
        let availableVoices = [];
        let history = JSON.parse(localStorage.getItem('ai_coach_history')) || [];
        let base64Image = null;
        let imageMimeType = null;
        let activeAudioSource = null;

        const geminiVoices = [
            { name: "Puck (男性・快活)", id: "Puck" },
            { name: "Charon (男性・落ち着き)", id: "Charon" },
            { name: "Kore (女性・クリア)", id: "Kore" },
            { name: "Fenrir (男性・ディープ)", id: "Fenrir" },
            { name: "Aoede (女性・エレガント)", id: "Aoede" }
        ];

        // Core Selectors
        const inputText = document.getElementById('inputText');
        const charCount = document.getElementById('charCount');
        const submitBtn = document.getElementById('submitBtn');
        const submitBtnText = document.getElementById('submitBtnText');
        const voiceBtn = document.getElementById('voiceBtn');
        const voiceBtnText = document.getElementById('voiceBtnText');
        const micIcon = document.getElementById('micIcon');
        const clearBtn = document.getElementById('clearBtn');
        const toast = document.getElementById('toast');
        const resultArea = document.getElementById('resultArea');
        const phraseCasual = document.getElementById('phraseCasual');
        const phraseFormal = document.getElementById('phraseFormal');
        const phraseExplanation = document.getElementById('phraseExplanation');
        const voiceSelect = document.getElementById('voiceSelect');
        const apiKeyBtn = document.getElementById('apiKeyBtn');
        const keyStatusText = document.getElementById('keyStatusText');
        const apiKeyModal = document.getElementById('apiKeyModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const historyList = document.getElementById('historyList');
        const emptyHistoryText = document.getElementById('emptyHistoryText');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const imageInput = document.getElementById('imageInput');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const removeImageBtn = document.getElementById('removeImageBtn');
        const browserAccentContainer = document.getElementById('browserAccentContainer');

        // Speech Recognition Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'ja-JP';

            recognition.onstart = () => {
                isListening = true;
                voiceBtn.classList.replace('bg-indigo-600', 'bg-red-600');
                voiceBtn.classList.replace('border-indigo-400', 'border-red-400');
                micIcon.className = 'fa-solid fa-circle-notch animate-spin';
                voiceBtnText.textContent = '聞き取り中...';
                showToast('マイクに向かって話してください 🎤');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                inputText.value += (inputText.value ? ' ' : '') + transcript;
                updateCharCount();
            };

            recognition.onerror = (event) => {
                console.error(event.error);
                showToast(`音声エラー: ${event.error === 'not-allowed' ? 'マイクのアクセス許可が必要です' : event.error}`);
                stopListening();
            };

            recognition.onend = () => { stopListening(); };
        }

        function stopListening() {
            isListening = false;
            voiceBtn.classList.replace('bg-red-600', 'bg-indigo-600');
            voiceBtn.classList.replace('border-red-400', 'border-indigo-400');
            micIcon.className = 'fa-solid fa-microphone';
            voiceBtnText.textContent = '声で入力';
            hideToast();
        }

        voiceBtn.addEventListener('click', () => {
            if (!recognition) {
                showToast('お使いのブラウザは音声認識をサポートしていません。Safariでお試しください。');
                return;
            }
            if (isListening) recognition.stop(); else recognition.start();
        });

        inputText.addEventListener('input', updateCharCount);
        function updateCharCount() {
            charCount.textContent = `${inputText.value.length} 文字`;
        }

        // Camera / Image upload Handling
        imageInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            imageMimeType = file.type;
            const reader = new FileReader();
            reader.onload = function(e) {
                base64Image = e.target.result.split(',')[1];
                imagePreview.src = e.target.result;
                imagePreviewContainer.classList.remove('hidden');
                inputText.placeholder = "この画像について「英語でなんて言う？」または質問を入力してください...";
            };
            reader.readAsDataURL(file);
        });

        removeImageBtn.addEventListener('click', () => {
            base64Image = null;
            imageMimeType = null;
            imageInput.value = '';
            imagePreview.src = '';
            imagePreviewContainer.classList.add('hidden');
            inputText.placeholder = "「これ英語でなんて言う？」や、直したい英文を入力するか、マイクボタンで話しかけてください...";
        });

        // Speaker Engine Rendering
        function renderSpeakers() {
            voiceSelect.innerHTML = '';
            if (currentEngine === 'browser') {
                browserAccentContainer.classList.remove('opacity-30', 'pointer-events-none');
                const filtered = availableVoices.filter(v => v.lang.startsWith(currentAccent));
                const targetList = filtered.length > 0 ? filtered : availableVoices.filter(v => v.lang.startsWith('en'));
                
                targetList.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.name;
                    opt.textContent = v.name;
                    voiceSelect.appendChild(opt);
                });
            } else {
                // Gemini Ultra AI Voice list
                browserAccentContainer.classList.add('opacity-30', 'pointer-events-none');
                geminiVoices.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.id;
                    opt.textContent = v.name;
                    voiceSelect.appendChild(opt);
                });
            }
            if (voiceSelect.children.length === 0) {
                const opt = document.createElement('option');
                opt.textContent = "標準ボイス (Default)";
                voiceSelect.appendChild(opt);
            }
        }

        function loadBrowserVoices() {
            availableVoices = window.speechSynthesis.getVoices();
            renderSpeakers();
        }
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = loadBrowserVoices;
        }
        loadBrowserVoices();

        // Voice Engine Tabs
        document.querySelectorAll('.engineTab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.engineTab').forEach(b => b.classList.remove('bg-indigo-600', 'text-white'));
                btn.classList.add('bg-indigo-600', 'text-white');
                currentEngine = btn.dataset.engine;
                renderSpeakers();
            });
        });

        // Browser Accent Selector
        document.querySelectorAll('.accentTab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.accentTab').forEach(b => b.classList.remove('bg-indigo-600', 'text-white'));
                btn.classList.add('bg-indigo-600', 'text-white');
                currentAccent = btn.dataset.accent;
                renderSpeakers();
            });
        });

        // Play Raw Linear PCM (16-bit, 24kHz) from Gemini API
        function playPcmBase64(base64Data, sampleRate = 24000) {
            try {
                if (activeAudioSource) { activeAudioSource.stop(); }
                
                const binaryString = window.atob(base64Data);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) { bytes[i] = binaryString.charCodeAt(i); }
                
                const numSamples = len / 2;
                const int16Array = new Int16Array(bytes.buffer);
                
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const audioBuffer = audioCtx.createBuffer(1, numSamples, sampleRate);
                const channelData = audioBuffer.getChannelData(0);
                
                for (let i = 0; i < numSamples; i++) {
                    channelData[i] = int16Array[i] / 32768.0;
                }
                
                activeAudioSource = audioCtx.createBufferSource();
                activeAudioSource.buffer = audioBuffer;
                activeAudioSource.connect(audioCtx.destination);
                activeAudioSource.start();
            } catch (e) {
                console.error("PCM再生エラー:", e);
                showToast("音声の再生に失敗しました。");
            }
        }

        // Core Text-to-Speech Router
        async function speakText(text) {
            if (!text) return;
            window.speechSynthesis.cancel();
            if (activeAudioSource) { try { activeAudioSource.stop(); } catch(e){} }

            if (currentEngine === 'browser' || !apiKey) {
                // Browser Native TTS
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = currentAccent;
                const selectedVoice = availableVoices.find(v => v.name === voiceSelect.value);
                if (selectedVoice) utterance.voice = selectedVoice;
                window.speechSynthesis.speak(utterance);
            } else {
                // Gemini Advanced Real-time Audio Generation
                showToast("AIボイス生成中... 🎙️");
                const voiceId = voiceSelect.value || "Puck";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
                
                const body = {
                    contents: [{ parts: [{ text: `Read the following English phrase clearly with natural native intonation and speed. Do not add any introduction or extra words, output raw speech audio only: "${text}"` }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: {
                            voiceConfig: {
                                prebuiltVoiceConfig: { voiceName: voiceId }
                            }
                        }
                    }
                };

                try {
                    const data = await fetchWithRetry(url, body);
                    const base64Audio = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                    if (base64Audio) {
                        hideToast();
                        playPcmBase64(base64Audio);
                    } else {
                        throw new Error("音声データが空です");
                    }
                } catch (err) {
                    console.error(err);
                    showToast("AIボイスの取得に失敗したため、標準音声で再生します。");
                    // Fallback to browser standard voice
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = currentAccent;
                    window.speechSynthesis.speak(utterance);
                }
            }
        }

        // Speaker Click Triggers
        document.querySelectorAll('.speakBtn').forEach(btn => {
            btn.addEventListener('click', () => {
                const text = document.getElementById(btn.dataset.target).textContent;
                speakText(text);
            });
        });

        clearBtn.addEventListener('click', () => {
            inputText.value = '';
            updateCharCount();
            removeImageBtn.click();
            resultArea.classList.add('hidden');
        });

        // Modal Controls
        apiKeyBtn.addEventListener('click', () => {
            apiKeyInput.value = apiKey;
            apiKeyModal.classList.remove('hidden');
        });
        closeModalBtn.addEventListener('click', () => { apiKeyModal.classList.add('hidden'); });
        saveKeyBtn.addEventListener('click', () => {
            apiKey = apiKeyInput.value.trim();
            localStorage.setItem('gemini_api_key', apiKey);
            updateKeyStatus();
            apiKeyModal.classList.add('hidden');
            showToast('APIキーをローカルに保存しました 🔑');
            setTimeout(hideToast, 1500);
        });

        function updateKeyStatus() {
            if (apiKey) {
                keyStatusText.textContent = 'APIキー有効';
                keyStatusText.className = 'text-emerald-400 font-semibold';
            } else {
                keyStatusText.textContent = 'APIキー設定';
                keyStatusText.className = 'text-slate-200';
            }
        }
        updateKeyStatus();

        // Fetch engine with Exponential Backoff Algorithm for Robustness (503 / 429 errors mitigation)
        async function fetchWithRetry(url, body, retries = 3, delay = 1500) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    if (response.status === 200) return await response.json();
                    if (response.status === 503 || response.status === 429) {
                        showToast(`サーバー混雑中... 再試行します (${i + 1}/${retries})`);
                        await new Promise(res => setTimeout(res, delay));
                        delay *= 2;
                        continue;
                    }
                    throw new Error(`API Error: ${response.status}`);
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(res => setTimeout(res, delay));
                }
            }
        }

        // Main Execution Logic
        submitBtn.addEventListener('click', async () => {
