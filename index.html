<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NativeSense - AI English Tutor</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#151e2e',
                            900: '#0f172a',
                            950: '#020617',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc; /* Slate 50 */
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none; /* Prevent pull-to-refresh on mobile if possible */
        }
        
        /* Custom Scrollbar for sleek look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(71, 85, 105, 0.8);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 116, 139, 1);
        }

        /* Safe area paddings for iOS Notch */
        .safe-pb { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .safe-pt { padding-top: env(safe-area-inset-top, 0px); }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .recording-pulse {
            animation: pulse-ring 2s infinite;
            background-color: #ef4444 !important; /* Red */
        }

        /* Loading Spinner */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-left-color: #3b82f6; /* Blue 500 */
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Toast Container */
        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: rgba(30, 41, 59, 0.95); /* Slate 800 */
            border: 1px solid #334155;
            color: white;
            padding: 12px 24px;
            border-radius: 9999px;
            font-size: 0.875rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: auto;
        }
    </style>
</head>
<body class="safe-pt text-slate-100 flex flex-col h-screen overflow-hidden">

    <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 flex-shrink-0 z-10 sticky top-0">
        <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-language text-xl"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">NativeSense</h1>
            </div>
            
            <button id="apiKeyBtn" class="flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-medium border transition-colors border-yellow-500/50 text-yellow-400 bg-yellow-500/10 hover:bg-yellow-500/20">
                <i class="fa-solid fa-key"></i>
                <span id="apiKeyStatusText">デモモード</span>
            </button>
        </div>
    </header>

    <!-- Toasts -->
    <div id="toast-container"></div>

    <!-- 翻訳ツールチップ -->
    <div id="wordTooltip" class="fixed hidden bg-slate-800/95 border border-blue-500/50 text-white px-4 py-2 rounded-xl shadow-2xl z-50 text-sm backdrop-blur-md pointer-events-none transform transition-all duration-200">
        <!-- JSでコンテンツを挿入 -->
    </div>

    <main class="flex-1 overflow-y-auto max-w-3xl w-full mx-auto p-4 safe-pb relative space-y-6">
        
        <!-- Input Section -->
        <section class="bg-slate-800/50 border border-slate-700/50 rounded-2xl p-4 shadow-sm relative backdrop-blur-sm">
            <div class="flex justify-between items-end mb-2">
                <label for="inputText" class="text-sm font-medium text-slate-300">翻訳・添削したいテキストを入力</label>
                <span id="charCount" class="text-xs text-slate-500 font-mono">0 / 200</span>
            </div>
            <div class="relative">
                <textarea id="inputText" rows="3" maxlength="200" placeholder="例: 明日の会議は10時からに変更できますか？&#10;例: I want to changing meeting time tomorrow." 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 resize-none transition-all"></textarea>
                
                <div class="absolute bottom-3 right-3 flex gap-2">
                    <button id="clearBtn" class="w-8 h-8 rounded-full bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700 flex items-center justify-center transition-colors" title="クリア">
                        <i class="fa-solid fa-eraser text-sm"></i>
                    </button>
                </div>
            </div>

            <!-- シチュエーション追加用アコーディオン -->
            <div class="mt-3">
                <button id="toggleContextBtn" class="flex items-center gap-1.5 text-xs text-slate-400 hover:text-slate-300 transition-colors">
                    <i id="toggleContextIcon" class="fa-solid fa-chevron-down text-[10px] w-3"></i>
                    <span>前提シチュエーション・固有名詞などを追加</span>
                </button>
                <div id="contextArea" class="hidden mt-2">
                    <textarea id="contextInput" rows="2" maxlength="200" placeholder="例: 上司へのメール、製品名「NativeSense」はそのままなど" 
                        class="w-full bg-slate-900/30 border border-slate-700/70 rounded-lg p-2.5 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:ring-1 focus:ring-blue-500/50 resize-none transition-all"></textarea>
                </div>
            </div>

            <div class="mt-4 pt-4 border-t border-slate-700/50 space-y-3">
                <div class="flex flex-col sm:flex-row justify-between gap-3 text-sm">
                    <div class="flex items-center justify-between sm:justify-start gap-2">
                        <span class="text-slate-400 text-xs"><i class="fa-solid fa-headphones text-xs mr-1"></i>エンジン:</span>
                        <div class="bg-slate-900 rounded-lg p-1 flex">
                            <button id="engineBrowser" class="px-3 py-1 rounded-md text-xs font-medium transition-all bg-slate-700 text-white shadow-sm">標準</button>
                            <button id="engineAI" class="px-3 py-1 rounded-md text-xs font-medium text-slate-400 transition-all hover:text-white bg-transparent">AI</button>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between sm:justify-end gap-2">
                        <span class="text-slate-400 text-xs"><i class="fa-solid fa-earth-americas text-xs mr-1"></i>発音:</span>
                        <div class="bg-slate-900 rounded-lg p-1 flex">
                            <button id="accentUS" class="px-3 py-1 rounded-md text-xs font-medium transition-all bg-slate-700 text-white shadow-sm">🇺🇸 US</button>
                            <button id="accentUK" class="px-3 py-1 rounded-md text-xs font-medium text-slate-400 transition-all hover:text-white bg-transparent">🇬🇧 UK</button>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center justify-between sm:justify-end gap-2 text-sm">
                    <span class="text-slate-400 text-xs"><i class="fa-solid fa-user text-xs mr-1"></i>話者:</span>
                    <div class="flex-1 sm:flex-none sm:w-[200px]">
                        <select id="voiceSelect" class="w-full bg-slate-900 border border-slate-700 text-slate-300 text-xs rounded-lg px-2 py-1.5 focus:outline-none focus:border-blue-500">
                            <!-- Populated by JS -->
                        </select>
                    </div>
                </div>
                
                <!-- 速度調整スライダー追加 -->
                <div class="flex items-center justify-between sm:justify-end gap-2 text-sm mt-3 pt-3 border-t border-slate-700/30">
                    <span class="text-slate-400 text-xs"><i class="fa-solid fa-gauge-high text-xs mr-1"></i>再生速度:</span>
                    <div class="flex-1 sm:flex-none sm:w-[200px] flex items-center gap-3">
                        <input type="range" id="speedSlider" min="0.5" max="1.0" step="0.1" value="1.0" class="w-full accent-blue-500 h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                        <span id="speedValue" class="text-xs text-slate-300 font-mono w-8 text-right">1.0x</span>
                    </div>
                </div>
            </div>

            <!-- 大きく配置した音声入力ボタン -->
            <button id="micBtn" class="w-full mt-4 bg-slate-800 border border-slate-700 hover:border-slate-600 text-blue-400 py-3 rounded-xl transition-all flex items-center justify-center gap-2 shadow-sm">
                <i class="fa-solid fa-microphone text-lg flex-shrink-0"></i>
                <span class="font-medium text-sm">音声でテキストを入力</span>
            </button>

            <button id="analyzeBtn" class="w-full mt-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-medium py-3 rounded-xl shadow-lg shadow-blue-900/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                <span>AIでネイティブ英語に変換</span>
                <i class="fa-solid fa-wand-magic-sparkles"></i>
            </button>
        </section>

        <section id="resultSection" class="hidden space-y-4 animate-fade-in">
            <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider ml-1">Result</h2>
            
            <!-- Casual -->
            <div class="bg-gradient-to-br from-slate-800 to-slate-850 border border-slate-700 rounded-2xl p-5 shadow-lg relative">
                <div class="absolute -top-3 left-4 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-0.5 rounded-full text-xs font-bold flex items-center gap-1.5">
                    <i class="fa-solid fa-mug-hot"></i> Casual / Daily
                </div>
                <div class="mt-2 flex justify-between items-start gap-4">
                    <p id="casualText" class="text-lg sm:text-xl font-medium leading-relaxed font-sans text-white flex-1"></p>
                    <button class="play-btn flex-shrink-0 w-10 h-10 rounded-full bg-blue-500/20 text-blue-400 hover:bg-blue-500 hover:text-white flex items-center justify-center transition-colors" data-target="casualText">
                        <i class="fa-solid fa-play"></i>
                    </button>
                </div>
            </div>

            <!-- Business -->
            <div class="bg-gradient-to-br from-slate-800 to-slate-850 border border-slate-700 rounded-2xl p-5 shadow-lg relative">
                <div class="absolute -top-3 left-4 bg-blue-500/10 text-blue-400 border border-blue-500/20 px-3 py-0.5 rounded-full text-xs font-bold flex items-center gap-1.5">
                    <i class="fa-solid fa-briefcase"></i> Polite / Business
                </div>
                <div class="mt-2 flex justify-between items-start gap-4">
                    <p id="businessText" class="text-lg sm:text-xl font-medium leading-relaxed font-sans text-white flex-1"></p>
                    <button class="play-btn flex-shrink-0 w-10 h-10 rounded-full bg-blue-500/20 text-blue-400 hover:bg-blue-500 hover:text-white flex items-center justify-center transition-colors" data-target="businessText">
                        <i class="fa-solid fa-play"></i>
                    </button>
                </div>
            </div>

            <!-- Advice -->
            <div class="bg-slate-800/80 border border-slate-700 rounded-2xl p-4 shadow-inner mt-2">
                <h3 class="text-xs font-bold text-amber-400 mb-2 flex items-center gap-1.5">
                    <i class="fa-regular fa-lightbulb"></i> ワンポイント解説
                </h3>
                <p id="adviceText" class="text-sm text-slate-300 leading-relaxed"></p>
            </div>
        </section>

        <section id="historySection" class="pt-6 pb-12">
            <div class="flex justify-between items-center mb-4 px-1">
                <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider flex items-center gap-2">
                    <i class="fa-solid fa-clock-rotate-left"></i> 学習履歴
                </h2>
                <button id="clearHistoryBtn" class="text-xs text-red-400 hover:text-red-300 transition-colors hidden">
                    <i class="fa-solid fa-trash-can mr-1"></i>履歴をクリア
                </button>
            </div>
            
            <div id="historyList" class="space-y-3">
                <p class="text-slate-500 text-sm text-center py-4 bg-slate-800/30 rounded-xl border border-dashed border-slate-700">履歴はまだありません</p>
            </div>
        </section>
    </main>

    <div id="apiKeyModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-sm shadow-2xl animate-fade-in relative">
            <button id="closeModalBtn" class="absolute top-4 right-4 text-slate-400 hover:text-white">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
            <h3 class="text-lg font-bold mb-2 flex items-center gap-2">
                <i class="fa-solid fa-key text-yellow-500"></i> APIキー設定
            </h3>
            <p class="text-xs text-slate-400 mb-4 leading-relaxed">
                Gemini APIキーを登録するとフル機能が利用できます。キーは端末（ブラウザ）内にのみ安全に保存されます。<br>
                ※未登録の場合はダミーデータを返す「デモモード」で動作します。
            </p>
            <div class="space-y-4">
                <div>
                    <input type="password" id="apiKeyInput" placeholder="AIzaSy..." class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm text-slate-100 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>
                <div class="flex gap-2">
                    <button id="removeKeyBtn" class="flex-1 py-2.5 rounded-xl border border-slate-700 text-slate-300 text-sm font-medium hover:bg-slate-800 transition-colors">削除</button>
                    <button id="saveKeyBtn" class="flex-1 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium transition-colors shadow-lg shadow-blue-900/30">保存</button>
                </div>
            </div>
            <div class="mt-4 pt-4 border-t border-slate-800 text-center">
                <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-xs text-blue-400 hover:underline">
                    Google AI Studioでキーを取得 <i class="fa-solid fa-external-link-alt text-[10px] ml-0.5"></i>
                </a>
            </div>
        </div>
    </div>

    <script>
        // --- State Variables ---
        let state = {
            apiKey: localStorage.getItem('nativeSense_apiKey') || '',
            history: JSON.parse(localStorage.getItem('nativeSense_history') || '[]'),
            ttsEngine: 'browser', // 'browser' | 'ai'
            accent: localStorage.getItem('nativeSense_accent') || 'US', // 'US' | 'UK'
            browserVoiceUri: localStorage.getItem('nativeSense_bVoice') || '',
            aiVoiceName: localStorage.getItem('nativeSense_aiVoice') || 'Zephyr',
            speed: parseFloat(localStorage.getItem('nativeSense_speed')) || 1.0 // 速度状態の追加
        };

        const AI_VOICES = [
            { id: 'Zephyr', name: 'Zephyr (Bright)' },
            { id: 'Puck', name: 'Puck (Upbeat)' },
            { id: 'Charon', name: 'Charon (Informative)' },
            { id: 'Kore', name: 'Kore (Firm)' },
            { id: 'Fenrir', name: 'Fenrir (Excitable)' }
        ];

        let browserVoices = [];
        let isRecording = false;
        let speechRecognition = null;
        let currentAudio = null; // For AI TTS Audio playback
        const audioCache = new Map(); // 生成した音声を保存するキャッシュ
        const wordDictionaryCache = new Map(); // 単語の翻訳を保存するキャッシュ
        let tooltipTimeout = null;

        // --- DOM Elements ---
        const els = {
            inputText: document.getElementById('inputText'),
            charCount: document.getElementById('charCount'),
            clearBtn: document.getElementById('clearBtn'),
            micBtn: document.getElementById('micBtn'),
            toggleContextBtn: document.getElementById('toggleContextBtn'),
            toggleContextIcon: document.getElementById('toggleContextIcon'),
            contextArea: document.getElementById('contextArea'),
            contextInput: document.getElementById('contextInput'),
            engineBrowser: document.getElementById('engineBrowser'),
            engineAI: document.getElementById('engineAI'),
            accentUS: document.getElementById('accentUS'),
            accentUK: document.getElementById('accentUK'),
            voiceSelect: document.getElementById('voiceSelect'),
            analyzeBtn: document.getElementById('analyzeBtn'),
            
            resultSection: document.getElementById('resultSection'),
            casualText: document.getElementById('casualText'),
            businessText: document.getElementById('businessText'),
            adviceText: document.getElementById('adviceText'),
            
            historySection: document.getElementById('historySection'),
            historyList: document.getElementById('historyList'),
            clearHistoryBtn: document.getElementById('clearHistoryBtn'),
            
            apiKeyBtn: document.getElementById('apiKeyBtn'),
            apiKeyStatusText: document.getElementById('apiKeyStatusText'),
            apiKeyModal: document.getElementById('apiKeyModal'),
            closeModalBtn: document.getElementById('closeModalBtn'),
            apiKeyInput: document.getElementById('apiKeyInput'),
            saveKeyBtn: document.getElementById('saveKeyBtn'),
            removeKeyBtn: document.getElementById('removeKeyBtn'),
            wordTooltip: document.getElementById('wordTooltip'),
            
            speedSlider: document.getElementById('speedSlider'),
            speedValue: document.getElementById('speedValue'),
        };

        // --- UI / Toast System ---
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast animate-fade-in flex items-center gap-2';
            
            let icon = '<i class="fa-solid fa-circle-info text-blue-400"></i>';
            if (type === 'success') icon = '<i class="fa-solid fa-circle-check text-emerald-400"></i>';
            if (type === 'error') icon = '<i class="fa-solid fa-circle-exclamation text-red-400"></i>';
            
            toast.innerHTML = `${icon} <span>${message}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function setButtonLoading(btn, isLoading, originalText, iconClass) {
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = `<div class="loader mr-2"></div> 処理中...`;
            } else {
                btn.disabled = false;
                btn.innerHTML = `<span>${originalText}</span> <i class="${iconClass}"></i>`;
            }
        }

        // --- Initialization ---
        function init() {
            updateApiKeyUI();
            renderHistory();
            initSpeechRecognition();
            initTTS();
            
            // スピードUIの初期化
            els.speedSlider.value = state.speed;
            els.speedValue.textContent = state.speed.toFixed(1) + 'x';
            
            setupEventListeners();
        }

        // --- API Key Management ---
        function updateApiKeyUI() {
            if (state.apiKey) {
                els.apiKeyBtn.className = "flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-medium border transition-colors border-emerald-500/50 text-emerald-400 bg-emerald-500/10 hover:bg-emerald-500/20";
                els.apiKeyStatusText.textContent = "APIキー有効";
            } else {
                els.apiKeyBtn.className = "flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-medium border transition-colors border-yellow-500/50 text-yellow-400 bg-yellow-500/10 hover:bg-yellow-500/20";
                els.apiKeyStatusText.textContent = "デモモード";
            }
        }

        function setupEventListeners() {
            // Text Input
            els.inputText.addEventListener('input', () => {
                els.charCount.textContent = `${els.inputText.value.length} / 200`;
            });

            els.clearBtn.addEventListener('click', () => {
                els.inputText.value = '';
                els.contextInput.value = '';
                els.charCount.textContent = '0 / 200';
                els.inputText.focus();
            });

            // Toggle Context
            els.toggleContextBtn.addEventListener('click', () => {
                els.contextArea.classList.toggle('hidden');
                if (els.contextArea.classList.contains('hidden')) {
                    els.toggleContextIcon.classList.replace('fa-chevron-up', 'fa-chevron-down');
                } else {
                    els.toggleContextIcon.classList.replace('fa-chevron-down', 'fa-chevron-up');
                    els.contextInput.focus();
                }
            });

            // Modal
            els.apiKeyBtn.addEventListener('click', () => {
                els.apiKeyInput.value = state.apiKey;
                els.apiKeyModal.classList.remove('hidden');
            });
            els.closeModalBtn.addEventListener('click', () => els.apiKeyModal.classList.add('hidden'));
            
            els.saveKeyBtn.addEventListener('click', () => {
                const key = els.apiKeyInput.value.trim();
                state.apiKey = key;
                localStorage.setItem('nativeSense_apiKey', key);
                updateApiKeyUI();
                els.apiKeyModal.classList.add('hidden');
                showToast('APIキーを保存しました', 'success');
            });

            els.removeKeyBtn.addEventListener('click', () => {
                state.apiKey = '';
                localStorage.removeItem('nativeSense_apiKey');
                updateApiKeyUI();
                els.apiKeyInput.value = '';
                els.apiKeyModal.classList.add('hidden');
                showToast('APIキーを削除し、デモモードに移行しました', 'info');
            });

            // Engine Toggle
            els.engineBrowser.addEventListener('click', () => switchTTSEngine('browser'));
            els.engineAI.addEventListener('click', () => switchTTSEngine('ai'));
            
            // Accent Toggle
            els.accentUS.addEventListener('click', () => switchAccent('US'));
            els.accentUK.addEventListener('click', () => switchAccent('UK'));
            
            // Voice Select Change
            els.voiceSelect.addEventListener('change', (e) => {
                if (state.ttsEngine === 'browser') {
                    state.browserVoiceUri = e.target.value;
                    localStorage.setItem('nativeSense_bVoice', state.browserVoiceUri);
                } else {
                    state.aiVoiceName = e.target.value;
                    localStorage.setItem('nativeSense_aiVoice', state.aiVoiceName);
                }
            });

            // Speed Slider Change
            els.speedSlider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                state.speed = val;
                els.speedValue.textContent = val.toFixed(1) + 'x';
                localStorage.setItem('nativeSense_speed', val);
                
                // 再生中の音声があれば即座に速度を反映（AI音声の場合）
                if (currentAudio) {
                    currentAudio.playbackRate = val;
                }
            });

            // Action
            els.analyzeBtn.addEventListener('click', handleAnalyze);

            // Play Buttons
            document.querySelectorAll('.play-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const targetId = e.currentTarget.getAttribute('data-target');
                    const text = document.getElementById(targetId).textContent;
                    if(text) playTTS(text);
                });
            });

            // History Clear
            els.clearHistoryBtn.addEventListener('click', () => {
                state.history = [];
                localStorage.removeItem('nativeSense_history');
                renderHistory();
                showToast('履歴をクリアしました');
            });

            // Tooltip outside click to close
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#wordTooltip') && e.target.tagName !== 'SPAN') {
                    els.wordTooltip.classList.add('hidden');
                }
            });
            
            // Hide tooltip on scroll for better mobile UX
            document.querySelector('main').addEventListener('scroll', () => {
                els.wordTooltip.classList.add('hidden');
            });
        }

        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                speechRecognition = new SpeechRecognition();
                speechRecognition.lang = 'ja-JP';
                speechRecognition.interimResults = false;
                speechRecognition.maxAlternatives = 1;

                speechRecognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    const currentText = els.inputText.value;
                    els.inputText.value = currentText + (currentText ? ' ' : '') + transcript;
                    els.charCount.textContent = `${els.inputText.value.length} / 200`;
                    stopRecording();
                };

                speechRecognition.onerror = (event) => {
                    console.warn("Speech config error", event.error);
                    stopRecording();
                    showToast(`音声入力エラー: ${event.error}`, 'error');
                };

                speechRecognition.onend = () => {
                    stopRecording();
                };

                els.micBtn.addEventListener('click', toggleRecording);
            } else {
                els.micBtn.style.display = 'none'; // Hide if not supported (some iOS webviews)
            }
        }

        function toggleRecording() {
            if (!speechRecognition) return;
            if (isRecording) {
                speechRecognition.stop();
            } else {
                try {
                    speechRecognition.start();
                    isRecording = true;
                    // ボタンを録音中のデザインに変更
                    els.micBtn.classList.remove('bg-slate-800', 'text-blue-400', 'border-slate-700', 'hover:border-slate-600');
                    els.micBtn.classList.add('bg-red-500', 'text-white', 'border-red-400', 'animate-pulse');
                    els.micBtn.innerHTML = '<i class="fa-solid fa-stop text-lg flex-shrink-0"></i><span class="font-medium text-sm">音声入力中... (タップで停止)</span>';
                    showToast('音声入力中...', 'info');
                } catch (e) {
                    showToast('マイクにアクセスできませんでした', 'error');
                }
            }
        }

        function stopRecording() {
            isRecording = false;
            // ボタンを元のデザインに戻す
            els.micBtn.classList.remove('bg-red-500', 'text-white', 'border-red-400', 'animate-pulse');
            els.micBtn.classList.add('bg-slate-800', 'text-blue-400', 'border-slate-700', 'hover:border-slate-600');
            els.micBtn.innerHTML = '<i class="fa-solid fa-microphone text-lg flex-shrink-0"></i><span class="font-medium text-sm">音声でテキストを入力</span>';
        }

        function initTTS() {
            switchTTSEngine(state.ttsEngine);
            switchAccent(state.accent);
            
            // Standard TTS voices load asynchronously
            if ('speechSynthesis' in window) {
                speechSynthesis.onvoiceschanged = () => {
                    if (state.ttsEngine === 'browser') populateBrowserVoices();
                };
            }
        }

        function switchTTSEngine(engine) {
            state.ttsEngine = engine;
            els.voiceSelect.innerHTML = '';
            
            if (engine === 'browser') {
                els.engineBrowser.className = "px-3 py-1 rounded-md text-xs font-medium transition-all bg-slate-700 text-white shadow-sm";
                els.engineAI.className = "px-3 py-1 rounded-md text-xs font-medium text-slate-400 transition-all hover:text-white bg-transparent";
                populateBrowserVoices();
            } else {
                els.engineAI.className = "px-3 py-1 rounded-md text-xs font-medium transition-all bg-blue-600 text-white shadow-sm";
                els.engineBrowser.className = "px-3 py-1 rounded-md text-xs font-medium text-slate-400 transition-all hover:text-white bg-transparent";
                populateAIVoices();
            }
        }

        function switchAccent(accent) {
            state.accent = accent;
            localStorage.setItem('nativeSense_accent', accent);
            
            if (accent === 'US') {
                els.accentUS.className = "px-3 py-1 rounded-md text-xs font-medium transition-all bg-slate-700 text-white shadow-sm";
                els.accentUK.className = "px-3 py-1 rounded-md text-xs font-medium text-slate-400 transition-all hover:text-white bg-transparent";
            } else {
                els.accentUK.className = "px-3 py-1 rounded-md text-xs font-medium transition-all bg-slate-700 text-white shadow-sm";
                els.accentUS.className = "px-3 py-1 rounded-md text-xs font-medium text-slate-400 transition-all hover:text-white bg-transparent";
            }
            
            if (state.ttsEngine === 'browser') {
                populateBrowserVoices();
            }
        }

        function populateBrowserVoices() {
            if (!('speechSynthesis' in window)) {
                els.voiceSelect.innerHTML = '<option value="">非対応ブラウザ</option>';
                return;
            }
            
            let allEnglishVoices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
            if (allEnglishVoices.length === 0) {
                els.voiceSelect.innerHTML = '<option value="">英語音声のロード待ち...</option>';
                return;
            }

            // Filter by accent
            if (state.accent === 'US') {
                browserVoices = allEnglishVoices.filter(v => v.lang.includes('US'));
                if (browserVoices.length === 0) browserVoices = allEnglishVoices; // fallback
            } else {
                browserVoices = allEnglishVoices.filter(v => v.lang.includes('GB') || v.lang.includes('UK'));
                if (browserVoices.length === 0) browserVoices = allEnglishVoices; // fallback
            }

            els.voiceSelect.innerHTML = '';
            let selectedUri = state.browserVoiceUri;
            let found = false;

            browserVoices.forEach(voice => {
                const option = document.createElement('option');
                option.value = voice.voiceURI;
                // Clean up name for UI
                let name = voice.name.replace(/English|United States|United Kingdom/ig, '').trim();
                let region = voice.lang.includes('GB') || voice.lang.includes('UK') ? 'UK' : 'US';
                option.textContent = `${region} - ${name || voice.name}`;
                
                if (voice.voiceURI === selectedUri) {
                    option.selected = true;
                    found = true;
                }
                els.voiceSelect.appendChild(option);
            });

            if (!found && browserVoices.length > 0) {
                els.voiceSelect.options[0].selected = true;
                state.browserVoiceUri = browserVoices[0].voiceURI;
            }
        }

        function populateAIVoices() {
            els.voiceSelect.innerHTML = '';
            AI_VOICES.forEach(voice => {
                const option = document.createElement('option');
                option.value = voice.id;
                option.textContent = voice.name;
                if (voice.id === state.aiVoiceName) option.selected = true;
                els.voiceSelect.appendChild(option);
            });
        }

        async function playTTS(text) {
            // Stop any currently playing audio
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            window.speechSynthesis.cancel();

            if (state.ttsEngine === 'browser') {
                playBrowserTTS(text);
            } else {
                await playAITTS(text);
            }
        }

        function playBrowserTTS(text) {
            if (!('speechSynthesis' in window)) return;
            const utterance = new SpeechSynthesisUtterance(text);
            
            const voice = browserVoices.find(v => v.voiceURI === state.browserVoiceUri) || browserVoices[0];
            if (voice) utterance.voice = voice;
            utterance.rate = state.speed; // スピード設定を反映
            
            window.speechSynthesis.speak(utterance);
        }

        // PCM L16 to WAV conversion
        function pcmToWav(pcmData, sampleRate) {
            const numChannels = 1;
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const dataSize = pcmData.length * 2;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            // Helper
            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);

            let offset = 44;
            for (let i = 0; i < pcmData.length; i++, offset += 2) {
                view.setInt16(offset, pcmData[i], true);
            }
            return new Blob([buffer], { type: 'audio/wav' });
        }

        function base64ToArrayBuffer(base64) {
            const binary_string = window.atob(base64);
            const len = binary_string.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binary_string.charCodeAt(i);
            }
            return bytes.buffer;
        }

        async function playAITTS(text) {
            if (!state.apiKey) {
                showToast('AI音声にはAPIキーが必要です。標準音声を使用します。', 'info');
                playBrowserTTS(text);
                return;
            }

            // キャッシュキーの作成（話者、アクセント、テキストの組み合わせ）
            const cacheKey = `${state.aiVoiceName}_${state.accent}_${text}`;
            
            // キャッシュが存在する場合はAPIを呼ばずに再生
            if (audioCache.has(cacheKey)) {
                currentAudio = new Audio(audioCache.get(cacheKey));
                currentAudio.playbackRate = state.speed; // スピード設定を反映
                currentAudio.play();
                return;
            }

            showToast('AI音声を生成中...', 'info');
            try {
                // 発音の指示をプロンプトに追加
                const promptText = state.accent === 'UK' 
                    ? `Speak in a clear British English accent: ${text}` 
                    : `Speak in a clear American English accent: ${text}`;

                const payload = {
                    contents: [{ parts: [{ text: promptText }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: {
                            voiceConfig: { prebuiltVoiceConfig: { voiceName: state.aiVoiceName } }
                        }
                    },
                    model: "gemini-2.5-flash-preview-tts"
                };

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${state.apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('API request failed');

                const result = await response.json();
                const part = result?.candidates?.[0]?.content?.parts?.[0];
                const audioData = part?.inlineData?.data;
                const mimeType = part?.inlineData?.mimeType;

                if (audioData && mimeType && mimeType.startsWith("audio/")) {
                    const match = mimeType.match(/rate=(\d+)/);
                    const sampleRate = match ? parseInt(match[1], 10) : 24000;
                    
                    const pcmBuffer = base64ToArrayBuffer(audioData);
                    const pcm16 = new Int16Array(pcmBuffer);
                    const wavBlob = pcmToWav(pcm16, sampleRate);
                    
                    const audioUrl = URL.createObjectURL(wavBlob);
                    
                    // 生成した音声をキャッシュに保存
                    audioCache.set(cacheKey, audioUrl);
                    
                    currentAudio = new Audio(audioUrl);
                    currentAudio.playbackRate = state.speed; // スピード設定を反映
                    currentAudio.play();
                } else {
                    throw new Error('Invalid audio data format');
                }
            } catch (error) {
                console.error(error);
                showToast('AI音声の生成に失敗しました。標準音声を使用します。', 'error');
                playBrowserTTS(text);
            }
        }

        async function handleAnalyze() {
            const text = els.inputText.value.trim();
            const contextText = els.contextInput.value.trim();
            if (!text) {
                showToast('テキストを入力してください', 'error');
                return;
            }

            setButtonLoading(els.analyzeBtn, true, 'AIでネイティブ英語に変換', 'fa-solid fa-wand-magic-sparkles');
            
            try {
                let resultObj;

                if (!state.apiKey) {
                    // DEMO MODE
                    await new Promise(r => setTimeout(r, 1000)); // fake delay
                    resultObj = {
                        casual: "Can we change tomorrow's meeting to 10 AM?",
                        business: "Would it be possible to reschedule tomorrow's meeting to 10:00 AM?",
                        advice: "カジュアルでは Can we change... で十分伝わります。ビジネスシーンでは Would it be possible to... と丁寧にお伺いを立てる表現が好まれます。"
                    };
                } else {
                    // API Call
                    resultObj = await callGeminiTextAPI(text, contextText);
                }

                // Update UI
                displayResult(resultObj);
                
                // Save History
                saveToHistory(text, contextText, resultObj);
                
                // Auto Play casual
                setTimeout(() => playTTS(resultObj.casual), 300);

            } catch (error) {
                console.error(error);
                showToast('通信エラーが発生しました。APIキーを確認してください。', 'error');
            } finally {
                setButtonLoading(els.analyzeBtn, false, 'AIでネイティブ英語に変換', 'fa-solid fa-wand-magic-sparkles');
            }
        }

        async function callGeminiTextAPI(inputText, contextText) {
            let systemPrompt = `You are an excellent English tutor. The user will provide a Japanese phrase or broken English. 
Provide a "casual" natural native expression, a "business" polite expression, and a 1-2 sentence "advice" in Japanese explaining the nuances or word choices.`;
            
            if (contextText) {
                systemPrompt += `\n\nTranslation Context / Rules:\n${contextText}`;
            }

            const payload = {
                contents: [{ parts: [{ text: inputText }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            casual: { type: "STRING", description: "Casual natural expression" },
                            business: { type: "STRING", description: "Polite business expression" },
                            advice: { type: "STRING", description: "Japanese advice (1-2 sentences)" }
                        },
                        required: ["casual", "business", "advice"]
                    }
                }
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${state.apiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error('Network response was not ok');
            
            const result = await response.json();
            const textContent = result.candidates?.[0]?.content?.parts?.[0]?.text;
            
            if (!textContent) throw new Error('No content returned');
            
            return JSON.parse(textContent);
        }

        function displayResult(data) {
            // 単語ごとにクリック可能な状態にしてセット
            createClickableText(data.casual, els.casualText);
            createClickableText(data.business, els.businessText);
            
            els.adviceText.textContent = data.advice;
            
            els.resultSection.classList.remove('hidden');
            // Re-trigger animation
            els.resultSection.classList.remove('animate-fade-in');
            void els.resultSection.offsetWidth; 
            els.resultSection.classList.add('animate-fade-in');
        }

        function saveToHistory(original, context, data) {
            const newItem = {
                id: Date.now(),
                original: original,
                context: context,
                casual: data.casual,
                business: data.business,
                advice: data.advice,
                date: new Date().toLocaleDateString('ja-JP')
            };

            state.history.unshift(newItem);
            if (state.history.length > 15) {
                state.history.pop(); // Keep max 15
            }
            
            localStorage.setItem('nativeSense_history', JSON.stringify(state.history));
            renderHistory();
        }

        function renderHistory() {
            if (state.history.length === 0) {
                els.historyList.innerHTML = `<p class="text-slate-500 text-sm text-center py-4 bg-slate-800/30 rounded-xl border border-dashed border-slate-700">履歴はまだありません</p>`;
                els.clearHistoryBtn.classList.add('hidden');
                return;
            }

            els.clearHistoryBtn.classList.remove('hidden');
            els.historyList.innerHTML = '';
            
            state.history.forEach(item => {
                const el = document.createElement('div');
                el.className = 'bg-slate-800/50 border border-slate-700/50 p-4 rounded-xl flex flex-col gap-2 relative';
                
                let contextHtml = item.context ? `<p class="text-[10px] text-amber-400/80 line-clamp-1 mb-1"><i class="fa-solid fa-quote-left mr-1"></i>${item.context}</p>` : '';

                // Original text & Date
                el.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <div class="flex-1 pr-4">
                            ${contextHtml}
                            <p class="text-xs text-slate-400 font-medium line-clamp-1" title="${item.original}">${item.original}</p>
                        </div>
                        <span class="text-[10px] text-slate-500">${item.date}</span>
                    </div>
                    
                    <div class="flex justify-between items-center bg-slate-900/50 p-2.5 rounded-lg border border-slate-800">
                        <div class="history-casual-text text-sm font-medium text-slate-200 pr-2 leading-relaxed flex-1"></div>
                        <button class="history-play-btn flex-shrink-0 w-8 h-8 rounded-full bg-slate-700 text-slate-300 hover:bg-blue-600 hover:text-white flex items-center justify-center transition-colors" data-text="${item.casual}">
                            <i class="fa-solid fa-play text-xs"></i>
                        </button>
                    </div>
                `;
                
                // 追加: 履歴のテキスト部分も単語ごとにクリック可能にして描画する
                const textContainer = el.querySelector('.history-casual-text');
                createClickableText(item.casual, textContainer);

                els.historyList.appendChild(el);
            });

            // Bind events for history play buttons
            document.querySelectorAll('.history-play-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const text = e.currentTarget.getAttribute('data-text');
                    playTTS(text);
                });
            });
        }

        // Start App
        window.addEventListener('DOMContentLoaded', init);

        // --- 単語翻訳機能 (Word Tooltip) ---
        function createClickableText(text, element) {
            element.innerHTML = '';
            // アルファベット、数字、アポストロフィ、ハイフンを単語として認識し分割
            const parts = text.split(/([a-zA-Z0-9'-]+)/);
            
            parts.forEach(part => {
                if (/^[a-zA-Z0-9'-]+$/.test(part)) {
                    const span = document.createElement('span');
                    span.textContent = part;
                    // クリック可能であることを示す点線の下線スタイル
                    span.className = 'cursor-pointer transition-colors border-b border-slate-500/40 border-dashed hover:text-blue-300 hover:border-blue-400';
                    span.addEventListener('click', (e) => handleWordClick(e, part));
                    element.appendChild(span);
                } else if (part) {
                    // スペースや記号はそのままテキストノードとして追加
                    element.appendChild(document.createTextNode(part));
                }
            });
        }

        async function handleWordClick(e, word) {
            e.stopPropagation(); // 外側クリックで閉じる処理をキャンセル
            
            const cleanWord = word.toLowerCase().replace(/[^a-z0-9'-]/g, '');
            if (!cleanWord) return;

            const tooltip = els.wordTooltip;
            
            // ローディング表示と位置調整
            tooltip.innerHTML = `<div class="flex items-center gap-2"><div class="loader" style="width:16px;height:16px;border-width:2px;"></div><span>検索中...</span></div>`;
            positionTooltip(tooltip, e.target);

            // キャッシュ確認
            if (wordDictionaryCache.has(cleanWord)) {
                showTooltipContent(word, wordDictionaryCache.get(cleanWord));
                return;
            }

            if (!state.apiKey) {
                showTooltipContent(word, "（デモ翻訳）");
                return;
            }

            try {
                const trans = await translateWordAPI(cleanWord);
                wordDictionaryCache.set(cleanWord, trans);
                showTooltipContent(word, trans);
            } catch(error) {
                console.error(error);
                showTooltipContent(word, "翻訳エラー");
            }
        }

        function showTooltipContent(originalWord, translatedText) {
            const tooltip = els.wordTooltip;
            tooltip.innerHTML = `
                <div class="flex flex-col items-center">
                    <span class="text-[10px] text-slate-400 font-mono tracking-wider mb-0.5">${originalWord.toLowerCase()}</span>
                    <span class="font-bold text-base text-white">${translatedText}</span>
                </div>
            `;
            
            // 4秒後に自動で隠す
            clearTimeout(tooltipTimeout);
            tooltipTimeout = setTimeout(() => {
                tooltip.classList.add('hidden');
            }, 4000);
        }

        function positionTooltip(tooltip, targetElement) {
            tooltip.classList.remove('hidden');
            const rect = targetElement.getBoundingClientRect();
            
            // ツールチップのデフォルト位置（単語の上部）
            let top = rect.top - tooltip.offsetHeight - 12;
            let left = rect.left + (rect.width / 2) - (tooltip.offsetWidth / 2);
            
            // 画面外にはみ出さないための処理
            if (top < 10) top = rect.bottom + 12; // 上にはみ出る場合は下に表示
            if (left < 10) left = 10; // 左端の保護
            if (left + tooltip.offsetWidth > window.innerWidth - 10) {
                left = window.innerWidth - tooltip.offsetWidth - 10; // 右端の保護
            }
            
            tooltip.style.top = `${top}px`;
            tooltip.style.left = `${left}px`;
        }

        async function translateWordAPI(word) {
            const systemPrompt = `あなたは優秀な英和辞典です。入力された英単語に対する最も一般的な「日本語の意味」を1つだけ、簡潔に回答してください。（最大10文字程度。発音記号や解説、不要な記号は一切含めないこと。）`;
            
            const payload = {
                contents: [{ parts: [{ text: word }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: {
                    temperature: 0.1, // 揺らぎを少なくして辞書らしい出力を固定化
                }
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${state.apiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error('API Error');
            const result = await response.json();
            return result.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "不明";
        }
