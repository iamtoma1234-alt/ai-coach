<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NativeSense - AI English Tutor</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#151e2e',
                            900: '#0f172a',
                            950: '#020617',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc; /* Slate 50 */
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
        ::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.8); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(100, 116, 139, 1); }

        .safe-pb { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .safe-pt { padding-top: env(safe-area-inset-top, 0px); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .animate-pulse-ring { animation: pulse-ring 2s infinite; }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid #334155;
            color: white;
            padding: 12px 24px;
            border-radius: 9999px;
            font-size: 0.875rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: auto;
        }
    </style>
</head>
<body class="safe-pt text-slate-100 flex flex-col h-screen overflow-hidden">

            <p class="text-xs text-slate-400 mb-4 leading-relaxed">
                Gemini APIキーを登録するとフル機能が利用できます。キーは端末内に安全に保存されます。<br>
            </p>
            <div class="space-y-4">

                    <input type="password" id="apiKeyInput" placeholder="AIzaSy..." class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm text-slate-100 focus:outline-none focus:border-blue-500">

            <div class="mt-4 pt-4 border-t border-slate-800 text-center">
                <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-xs text-blue-400 hover:underline">

    <script>
        // ==========================================
        // 1. IndexedDB Setup (音声の完全保存用)
        // ==========================================
        const DB_NAME = 'NativeSenseDB';
        const STORE_NAME = 'audioStore';

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function saveAudioToDB(key, blob) {
            try {
                const db = await initDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    store.put(blob, key);
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            } catch(e) { console.error("DB Write Error:", e); }
        }

        async function getAudioFromDB(key) {
            try {
                const db = await initDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const store = tx.objectStore(STORE_NAME);
                    const req = store.get(key);
                    req.onsuccess = () => resolve(req.result); // undefined if not found
                    req.onerror = (e) => reject(e.target.error);
                });
            } catch(e) { 
                console.error("DB Read Error:", e); 
                return null; 
            }
        }

        // ==========================================
        // 2. State & Variables
        // ==========================================
        let state = {
            apiKey: localStorage.getItem('nativeSense_apiKey') || '',
            history: JSON.parse(localStorage.getItem('nativeSense_history') || '[]'),
            studyList: JSON.parse(localStorage.getItem('nativeSense_studyList') || '[]'),
            
            ttsEngine: 'browser', // 'browser' | 'ai'
            accent: localStorage.getItem('nativeSense_accent') || 'US',
            browserVoiceUri: localStorage.getItem('nativeSense_bVoice') || '',
            aiVoiceName: localStorage.getItem('nativeSense_aiVoice') || 'Zephyr',
            speed: parseFloat(localStorage.getItem('nativeSense_speed')) || 1.0,
            
            isLooping: false,
            currentResult: null // 最後に変換した結果（リスト登録用）
        };

        const AI_VOICES = [
            { id: 'Zephyr', name: 'Zephyr (Bright)' },
            { id: 'Puck', name: 'Puck (Upbeat)' },
            { id: 'Charon', name: 'Charon (Informative)' },
            { id: 'Kore', name: 'Kore (Firm)' },
            { id: 'Fenrir', name: 'Fenrir (Excitable)' }
        ];

        let browserVoices = [];
        let isRecording = false;
        let speechRecognition = null;
        
        // 再生管理
        let playbackState = {
            audioObj: null,
            isPlayingQueue: false,
            queueType: null, // 'history' | 'list'
            queue: [],
            currentText: ''
        };
        const audioCache = new Map(); // メモリキャッシュ
        const wordDictionaryCache = new Map();
        let tooltipTimeout = null;
        let loopTimeout = null;

        // グローバルオーディオプレイヤー (iOSの自動再生制限対策)
        const globalAudioPlayer = new Audio();

        // ==========================================
        // 3. DOM Elements
        // ==========================================
        const els = {
            logoBtn: document.getElementById('logoBtn'),
            navStudyListBtn: document.getElementById('navStudyListBtn'),
            mainView: document.getElementById('mainView'),
            listView: document.getElementById('listView'),
            
            inputText: document.getElementById('inputText'),
            charCount: document.getElementById('charCount'),
            clearBtn: document.getElementById('clearBtn'),
            micBtn: document.getElementById('micBtn'),
            toggleContextBtn: document.getElementById('toggleContextBtn'),
            toggleContextIcon: document.getElementById('toggleContextIcon'),
            contextArea: document.getElementById('contextArea'),
            contextInput: document.getElementById('contextInput'),
            
            engineBrowser: document.getElementById('engineBrowser'),
            engineAI: document.getElementById('engineAI'),
            accentUS: document.getElementById('accentUS'),
            accentUK: document.getElementById('accentUK'),
            voiceSelect: document.getElementById('voiceSelect'),
            speedSlider: document.getElementById('speedSlider'),
            speedValue: document.getElementById('speedValue'),
            loopToggleBtn: document.getElementById('loopToggleBtn'),
            loopToggleKnob: document.getElementById('loopToggleKnob'),
            loopStatusText: document.getElementById('loopStatusText'),
            analyzeBtn: document.getElementById('analyzeBtn'),
            
            resultSection: document.getElementById('resultSection'),
            casualText: document.getElementById('casualText'),
            businessText: document.getElementById('businessText'),
            adviceText: document.getElementById('adviceText'),
            saveToListBtn: document.getElementById('saveToListBtn'),
            saveToListIcon: document.getElementById('saveToListIcon'),
            
            historyList: document.getElementById('historyList'),
            clearHistoryBtn: document.getElementById('clearHistoryBtn'),
            playAllHistoryBtn: document.getElementById('playAllHistoryBtn'),
            
            studyListContainer: document.getElementById('studyListContainer'),
            playAllListBtn: document.getElementById('playAllListBtn'),
            
            apiKeyBtn: document.getElementById('apiKeyBtn'),
            apiKeyStatusText: document.getElementById('apiKeyStatusText'),
            apiKeyModal: document.getElementById('apiKeyModal'),
            closeModalBtn: document.getElementById('closeModalBtn'),
            apiKeyInput: document.getElementById('apiKeyInput'),
            saveKeyBtn: document.getElementById('saveKeyBtn'),
            removeKeyBtn: document.getElementById('removeKeyBtn'),
            wordTooltip: document.getElementById('wordTooltip')
        };

        // ==========================================
        // 4. Initialization & UI Setup
        // ==========================================
        function init() {
            updateApiKeyUI();
            renderHistory();
            renderStudyList();
            initSpeechRecognition();
            initTTS();
            
            els.speedSlider.value = state.speed;
            els.speedValue.textContent = state.speed.toFixed(1) + 'x';
            
            setupEventListeners();
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast animate-fade-in flex items-center gap-2';
            
            let icon = '<i class="fa-solid fa-circle-info text-blue-400"></i>';
            if (type === 'success') icon = '<i class="fa-solid fa-circle-check text-emerald-400"></i>';
            if (type === 'error') icon = '<i class="fa-solid fa-circle-exclamation text-red-400"></i>';
            
            toast.innerHTML = `${icon} <span>${message}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function setButtonLoading(btn, isLoading, originalText, iconClass) {
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = `<div class="loader mr-2"></div> 処理中...`;
            } else {
                btn.disabled = false;
                btn.innerHTML = `<span>${originalText}</span> <i class="${iconClass}"></i>`;
            }
        }

        // View Switcher (Main <-> List)
        function switchView(viewName) {
            stopQueue(); 
            if (viewName === 'list') {
                els.mainView.classList.add('hidden');
                els.listView.classList.remove('hidden');
                
                els.navStudyListBtn.classList.replace('text-slate-400', 'text-blue-400');
                els.navStudyListBtn.classList.add('bg-blue-500/10', 'border', 'border-blue-500/50');
                renderStudyList();
            } else {
                els.listView.classList.add('hidden');
                els.mainView.classList.remove('hidden');
                
                els.navStudyListBtn.classList.replace('text-blue-400', 'text-slate-400');
                els.navStudyListBtn.classList.remove('bg-blue-500/10', 'border', 'border-blue-500/50');
            }
        }

        // ユーザーインタラクション時にAudioをアンロックする (iOS Safari対策)
        function unlockAudio() {
            if (!globalAudioPlayer.src) {
                // 無音のWAVデータをセットして一瞬だけ再生・停止する
                globalAudioPlayer.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA";
                globalAudioPlayer.play().then(() => {
                    globalAudioPlayer.pause();
                }).catch(() => {});
            }
            document.removeEventListener('touchstart', unlockAudio);
            document.removeEventListener('click', unlockAudio);
        }

        function setupEventListeners() {
            // Audio Unlock (Mobile)
            document.addEventListener('touchstart', unlockAudio);
            document.addEventListener('click', unlockAudio);

            // View Navigation
            els.logoBtn.addEventListener('click', () => switchView('main'));
            els.navStudyListBtn.addEventListener('click', () => {
                if (els.listView.classList.contains('hidden')) switchView('list');
                else switchView('main');
            });

            // Input
            els.inputText.addEventListener('input', () => els.charCount.textContent = `${els.inputText.value.length} / 200`);
            els.clearBtn.addEventListener('click', () => {
                els.inputText.value = '';
                els.contextInput.value = '';
                els.charCount.textContent = '0 / 200';
                els.inputText.focus();
                stopQueue(); 
            });

            els.toggleContextBtn.addEventListener('click', () => {
                els.contextArea.classList.toggle('hidden');
                if (els.contextArea.classList.contains('hidden')) {
                    els.toggleContextIcon.classList.replace('fa-chevron-up', 'fa-chevron-down');
                } else {
                    els.toggleContextIcon.classList.replace('fa-chevron-down', 'fa-chevron-up');
                    els.contextInput.focus();
                }
            });

            // API Modal
            els.apiKeyBtn.addEventListener('click', () => {
                els.apiKeyInput.value = state.apiKey;
                els.apiKeyModal.classList.remove('hidden');
            });
            els.closeModalBtn.addEventListener('click', () => els.apiKeyModal.classList.add('hidden'));
            els.saveKeyBtn.addEventListener('click', () => {
                state.apiKey = els.apiKeyInput.value.trim();
                localStorage.setItem('nativeSense_apiKey', state.apiKey);
                updateApiKeyUI();
                els.apiKeyModal.classList.add('hidden');
                showToast('APIキーを保存しました', 'success');
            });
            els.removeKeyBtn.addEventListener('click', () => {
                state.apiKey = '';
                localStorage.removeItem('nativeSense_apiKey');
                updateApiKeyUI();
                els.apiKeyInput.value = '';
                els.apiKeyModal.classList.add('hidden');
                showToast('APIキーを削除しました', 'info');
            });

            // Settings
            els.engineBrowser.addEventListener('click', () => switchTTSEngine('browser'));
            els.engineAI.addEventListener('click', () => switchTTSEngine('ai'));
            els.accentUS.addEventListener('click', () => switchAccent('US'));
            els.accentUK.addEventListener('click', () => switchAccent('UK'));
            
            els.voiceSelect.addEventListener('change', (e) => {
                if (state.ttsEngine === 'browser') {
                    state.browserVoiceUri = e.target.value;
                    localStorage.setItem('nativeSense_bVoice', state.browserVoiceUri);
                } else {
                    state.aiVoiceName = e.target.value;
                    localStorage.setItem('nativeSense_aiVoice', state.aiVoiceName);
                }
            });

            els.speedSlider.addEventListener('input', (e) => {
                state.speed = parseFloat(e.target.value);
                els.speedValue.textContent = state.speed.toFixed(1) + 'x';
                localStorage.setItem('nativeSense_speed', state.speed);
                if (playbackState.audioObj) playbackState.audioObj.playbackRate = state.speed;
            });

            els.loopToggleBtn.addEventListener('click', () => {
                state.isLooping = !state.isLooping;
                if (state.isLooping) {
                    els.loopToggleBtn.classList.replace('bg-slate-700', 'bg-blue-500');
                    els.loopToggleKnob.classList.replace('translate-x-1', 'translate-x-6');
                    els.loopStatusText.textContent = 'ON';
                    els.loopStatusText.classList.replace('text-slate-500', 'text-blue-400');
                    showToast('単一フレーズの連続再生をONにしました', 'info');
                } else {
                    els.loopToggleBtn.classList.replace('bg-blue-500', 'bg-slate-700');
                    els.loopToggleKnob.classList.replace('translate-x-6', 'translate-x-1');
                    els.loopStatusText.textContent = 'OFF';
                    els.loopStatusText.classList.replace('text-blue-400', 'text-slate-500');
                    if (loopTimeout && !playbackState.isPlayingQueue) {
                        clearTimeout(loopTimeout);
                        loopTimeout = null;
                    }
                }
            });

            // Action
            els.analyzeBtn.addEventListener('click', handleAnalyze);

            // Save to List Btn
            els.saveToListBtn.addEventListener('click', handleSaveToList);

            // Queue Play
            els.playAllHistoryBtn.addEventListener('click', () => {
                if (playbackState.isPlayingQueue && playbackState.queueType === 'history') stopQueue();
                else startQueue('history');
            });
            els.playAllListBtn.addEventListener('click', () => {
                if (playbackState.isPlayingQueue && playbackState.queueType === 'list') stopQueue();
                else startQueue('list');
            });

            els.clearHistoryBtn.addEventListener('click', () => {
                state.history = [];
                localStorage.removeItem('nativeSense_history');
                renderHistory();
                if (playbackState.queueType === 'history') stopQueue();
                showToast('履歴をクリアしました');
            });

            // Result Play buttons
            document.querySelectorAll('.play-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const targetId = e.currentTarget.getAttribute('data-target');
                    const text = document.getElementById(targetId).textContent;
                    if(text) playTTS(text);
                });
            });

            // Tooltip outside click
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#wordTooltip') && e.target.tagName !== 'SPAN') els.wordTooltip.classList.add('hidden');
            });
            document.getElementById('mainView').addEventListener('scroll', () => els.wordTooltip.classList.add('hidden'));
            document.getElementById('listView').addEventListener('scroll', () => els.wordTooltip.classList.add('hidden'));
        }

        function updateApiKeyUI() {
            if (state.apiKey) {
                els.apiKeyBtn.className = "flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-medium border transition-colors border-emerald-500/50 text-emerald-400 bg-emerald-500/10 hover:bg-emerald-500/20";
                els.apiKeyStatusText.textContent = "APIキー有効";
            } else {
                els.apiKeyBtn.className = "flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-medium border transition-colors border-yellow-500/50 text-yellow-400 bg-yellow-500/10 hover:bg-yellow-500/20";
                els.apiKeyStatusText.textContent = "デモモード";
            }
        }

        // ==========================================
        // 5. Audio Playback Control
        // ==========================================
        function initTTS() {
            switchTTSEngine(state.ttsEngine);
            switchAccent(state.accent);
            
            if ('speechSynthesis' in window) {
                speechSynthesis.onvoiceschanged = () => {
                    if (state.ttsEngine === 'browser') populateBrowserVoices();
                };
            }
        }

        function switchTTSEngine(engine) {
            state.ttsEngine = engine;
            els.voiceSelect.innerHTML = '';
            
            if (engine === 'browser') {
                els.engineBrowser.className = "px-3 py-1 rounded-md text-xs font-medium transition-all bg-slate-700 text-white shadow-sm";
                els.engineAI.className = "px-3 py-1 rounded-md text-xs font-medium text-slate-400 transition-all hover:text-white bg-transparent";
                populateBrowserVoices();
            } else {
                els.engineAI.className = "px-3 py-1 rounded-md text-xs font-medium transition-all bg-blue-600 text-white shadow-sm";
                els.engineBrowser.className = "px-3 py-1 rounded-md text-xs font-medium text-slate-400 transition-all hover:text-white bg-transparent";
                populateAIVoices();
            }
        }

        function switchAccent(accent) {
            state.accent = accent;
            localStorage.setItem('nativeSense_accent', accent);
            
            if (accent === 'US') {
                els.accentUS.className = "px-3 py-1 rounded-md text-xs font-medium transition-all bg-slate-700 text-white shadow-sm";
                els.accentUK.className = "px-3 py-1 rounded-md text-xs font-medium text-slate-400 transition-all hover:text-white bg-transparent";
            } else {
                els.accentUK.className = "px-3 py-1 rounded-md text-xs font-medium transition-all bg-slate-700 text-white shadow-sm";
                els.accentUS.className = "px-3 py-1 rounded-md text-xs font-medium text-slate-400 transition-all hover:text-white bg-transparent";
            }
            
            if (state.ttsEngine === 'browser') {
                populateBrowserVoices();
            }
        }

        function populateBrowserVoices() {
            if (!('speechSynthesis' in window)) {
                els.voiceSelect.innerHTML = '<option value="">非対応ブラウザ</option>';
                return;
            }
            
            let allEnglishVoices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
            if (allEnglishVoices.length === 0) {
                els.voiceSelect.innerHTML = '<option value="">英語音声のロード待ち...</option>';
                return;
            }

            if (state.accent === 'US') {
                browserVoices = allEnglishVoices.filter(v => v.lang.includes('US'));
                if (browserVoices.length === 0) browserVoices = allEnglishVoices; 
            } else {
                browserVoices = allEnglishVoices.filter(v => v.lang.includes('GB') || v.lang.includes('UK'));
                if (browserVoices.length === 0) browserVoices = allEnglishVoices; 
            }

            els.voiceSelect.innerHTML = '';
            let selectedUri = state.browserVoiceUri;
            let found = false;

            browserVoices.forEach(voice => {
                const option = document.createElement('option');
                option.value = voice.voiceURI;
                let name = voice.name.replace(/English|United States|United Kingdom/ig, '').trim();
                let region = voice.lang.includes('GB') || voice.lang.includes('UK') ? 'UK' : 'US';
                option.textContent = `${region} - ${name || voice.name}`;
                
                if (voice.voiceURI === selectedUri) {
                    option.selected = true;
                    found = true;
                }
                els.voiceSelect.appendChild(option);
            });

            if (!found && browserVoices.length > 0) {
                els.voiceSelect.options[0].selected = true;
                state.browserVoiceUri = browserVoices[0].voiceURI;
            }
        }

        function populateAIVoices() {
            els.voiceSelect.innerHTML = '';
            AI_VOICES.forEach(voice => {
                const option = document.createElement('option');
                option.value = voice.id;
                option.textContent = voice.name;
                if (voice.id === state.aiVoiceName) option.selected = true;
                els.voiceSelect.appendChild(option);
            });
        }

        function stopAudio() {
            if (loopTimeout) clearTimeout(loopTimeout);
            if (playbackState.audioObj) {
                playbackState.audioObj.pause();
                // 連続再生によるバグを防ぐため、イベントリスナーをリセット
                playbackState.audioObj.onended = null;
            }
            window.speechSynthesis.cancel();
            playbackState.currentText = '';
        }

        function handlePlaybackEnd(text) {
            // 現在のテキストと一致している場合のみ次に進む
            if (playbackState.currentText !== text) return;

            if (playbackState.isPlayingQueue) {
                // キュー再生中の場合、確実に次へ
                loopTimeout = setTimeout(() => playNextInQueue(), 1000);
            } 
            else if (state.isLooping) {
                // 単一ループ再生中の場合
                loopTimeout = setTimeout(() => {
                    if (state.isLooping) {
                        if (playbackState.audioObj) {
                            playbackState.audioObj.currentTime = 0;
                            playbackState.audioObj.play().catch(e => console.error("Loop play blocked", e));
                        } else {
                            playBrowserTTS(text);
                        }
                    }
                }, 1000);
            }
        }

        // ここが一番重要な修正ポイント（グローバルなAudioオブジェクトを使い回す）
        function playAudioURL(url, text) {
            // イベントリスナーの重複を防ぐ
            globalAudioPlayer.onended = null;
            
            globalAudioPlayer.src = url;
            globalAudioPlayer.playbackRate = state.speed;
            
            playbackState.audioObj = globalAudioPlayer;
            playbackState.currentText = text;
            
            globalAudioPlayer.onended = () => handlePlaybackEnd(text);
            
            // Promiseをキャッチしてエラーを回避
            const playPromise = globalAudioPlayer.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.error("Audio playback error:", error);
                    if (playbackState.isPlayingQueue) {
                        stopQueue();
                        showToast('ブラウザの制限により連続再生が停止しました。画面を一度タップしてからお試しください。', 'error');
                    }
                });
            }
        }

        async function playTTS(text, forceEngine = null, forceVoice = null, forceAccent = null) {
            stopAudio();
            playbackState.currentText = text;

            const engine = forceEngine || state.ttsEngine;
            
            if (engine === 'browser') {
                playBrowserTTS(text, forceVoice, forceAccent);
            } else {
                await playAITTS(text, forceVoice, forceAccent);
            }
        }

        function playBrowserTTS(text, forceVoice, forceAccent) {
            if (!('speechSynthesis' in window)) return;
            const utterance = new SpeechSynthesisUtterance(text);
            
            const voice = browserVoices.find(v => v.voiceURI === state.browserVoiceUri) || browserVoices[0];
            if (voice) utterance.voice = voice;
            utterance.rate = state.speed; 
            
            utterance.onend = () => handlePlaybackEnd(text);
            window.speechSynthesis.speak(utterance);
        }

        async function playAITTS(text, forceVoice, forceAccent) {
            if (!state.apiKey) {
                showToast('AI音声にはAPIキーが必要です。標準音声を使用します。', 'info');
                playBrowserTTS(text);
                return;
            }

            const vName = forceVoice || state.aiVoiceName;
            const acc = forceAccent || state.accent;
            const cacheKey = `${vName}_${acc}_${text}`;

            // 1. Check Memory Cache
            if (audioCache.has(cacheKey)) {
                playAudioURL(audioCache.get(cacheKey), text);
                return;
            }

            // 2. Check IndexedDB
            try {
                const blob = await getAudioFromDB(cacheKey);
                if (blob) {
                    const url = URL.createObjectURL(blob);
                    audioCache.set(cacheKey, url);
                    playAudioURL(url, text);
                    return;
                }
            } catch(e) { console.error(e); }

            // 3. Generate via API
            if (!playbackState.isPlayingQueue) showToast('AI音声を生成中...', 'info');
            
            try {
                const promptText = acc === 'UK' 
                    ? `Speak in a clear British English accent: ${text}` 
                    : `Speak in a clear American English accent: ${text}`;

                const payload = {
                    contents: [{ parts: [{ text: promptText }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: vName } } }
                    },
                    model: "gemini-2.5-flash-preview-tts"
                };

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${state.apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('API failed');
                const result = await response.json();
                const part = result?.candidates?.[0]?.content?.parts?.[0];
                
                if (part?.inlineData?.data) {
                    const match = part.inlineData.mimeType.match(/rate=(\d+)/);
                    const sampleRate = match ? parseInt(match[1], 10) : 24000;
                    const pcmBuffer = base64ToArrayBuffer(part.inlineData.data);
                    const pcm16 = new Int16Array(pcmBuffer);
                    const wavBlob = pcmToWav(pcm16, sampleRate);
                    
                    saveAudioToDB(cacheKey, wavBlob);

                    const audioUrl = URL.createObjectURL(wavBlob);
                    audioCache.set(cacheKey, audioUrl);
                    playAudioURL(audioUrl, text);
                } else {
                    throw new Error('Invalid format');
                }
            } catch (error) {
                console.error(error);
                showToast('AI音声の生成に失敗しました。', 'error');
                playBrowserTTS(text);
            }
        }

        // ==========================================
        // 6. Queue Playback (全件連続再生)
        // ==========================================
        function stopQueue() {
            stopAudio();
            playbackState.isPlayingQueue = false;
            playbackState.queue = [];
            playbackState.queueType = null;
            updateQueueUI();
            highlightItem(null);
        }

        function startQueue(type) { // 'history' | 'list'
            stopAudio();
            playbackState.queueType = type;
            playbackState.isPlayingQueue = true;
            
            if (type === 'history') {
                playbackState.queue = [...state.history];
            } else {
                playbackState.queue = [...state.studyList];
            }
            
            if (playbackState.queue.length === 0) return stopQueue();
            
            updateQueueUI();
            showToast(type === 'history' ? '履歴の全件再生を開始します' : '学習リストの全件再生を開始します', 'info');
            playNextInQueue();
        }

        function playNextInQueue() {
            if (!playbackState.isPlayingQueue || playbackState.queue.length === 0) {
                stopQueue();
                showToast('全件再生が終了しました', 'success');
                return;
            }
            
            const nextItem = playbackState.queue.shift();
            highlightItem(nextItem.id, playbackState.queueType);
            
            // 重要：少し間隔をあけてから確実にTTSを呼び出す
            setTimeout(async () => {
                if (!playbackState.isPlayingQueue) return; // 待機中に停止された場合を考慮
                
                if (playbackState.queueType === 'list') {
                    await playTTS(nextItem.casual, 'ai', nextItem.voiceName, nextItem.accent);
                } else {
                    await playTTS(nextItem.casual);
                }
            }, 300);
        }

        function updateQueueUI() {
            const hBtn = els.playAllHistoryBtn;
            const lBtn = els.playAllListBtn;
            
            hBtn.innerHTML = `<i class="fa-solid fa-play"></i> 全件再生`;
            hBtn.className = "text-xs bg-slate-700 text-slate-300 hover:bg-blue-500 hover:text-white px-3 py-1 rounded-full transition-colors flex items-center gap-1.5 font-medium shadow-sm";
            
            lBtn.innerHTML = `<i class="fa-solid fa-play"></i> リスト全件再生`;
            lBtn.className = "flex-1 sm:flex-none bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2 font-medium";

            if (playbackState.isPlayingQueue) {
                if (playbackState.queueType === 'history') {
                    hBtn.innerHTML = `<i class="fa-solid fa-stop"></i> 停止する`;
                    hBtn.className = "text-xs bg-red-500/20 text-red-400 hover:bg-red-500 hover:text-white px-3 py-1 rounded-full transition-colors flex items-center gap-1.5 font-medium shadow-sm animate-pulse-ring";
                } else {
                    lBtn.innerHTML = `<i class="fa-solid fa-stop"></i> 停止する`;
                    lBtn.className = "flex-1 sm:flex-none bg-red-600 hover:bg-red-500 text-white px-5 py-2.5 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2 font-medium animate-pulse-ring";
                }
            }
        }

        function highlightItem(id, type) {
            const selector = type === 'history' ? '#historyList > div' : '#studyListContainer > div';
            document.querySelectorAll(selector).forEach(el => {
                if (el.getAttribute('data-id') == id) {
                    el.classList.add('border-blue-500/50', 'bg-slate-800');
                    el.classList.remove('border-slate-700/50', 'bg-slate-800/50');
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    el.classList.remove('border-blue-500/50', 'bg-slate-800');
                    el.classList.add('border-slate-700/50', 'bg-slate-800/50');
                }
            });
        }


        // ==========================================
        // 7. Study List Management
        // ==========================================
        function updateSaveBtnState() {
            if (!state.currentResult) {
                els.saveToListBtn.classList.add('hidden');
                return;
            }
            els.saveToListBtn.classList.remove('hidden');
            
            const exists = state.studyList.some(item => item.casual === state.currentResult.casual);
            if (exists) {
                els.saveToListIcon.className = "fa-solid fa-star text-yellow-400";
                els.saveToListBtn.title = "学習リストから削除";
            } else {
                els.saveToListIcon.className = "fa-regular fa-star text-slate-400";
                els.saveToListBtn.title = "学習リストに保存";
            }
        }

        function handleSaveToList() {
            if (!state.currentResult) return;
            const existsIndex = state.studyList.findIndex(item => item.casual === state.currentResult.casual);
            
            if (existsIndex >= 0) {
                state.studyList.splice(existsIndex, 1);
                showToast('学習リストから削除しました');
            } else {
                const newItem = {
                    id: Date.now(),
                    original: state.currentResult.original,
                    context: state.currentResult.context,
                    casual: state.currentResult.casual,
                    voiceName: state.currentResult.voiceName,
                    accent: state.currentResult.accent,
                    date: new Date().toLocaleDateString('ja-JP')
                };
                state.studyList.unshift(newItem);
                showToast('学習リストに保存しました！', 'success');
            }
            
            localStorage.setItem('nativeSense_studyList', JSON.stringify(state.studyList));
            updateSaveBtnState();
            renderStudyList();
        }

        function renderStudyList() {
            if (state.studyList.length === 0) {
                els.studyListContainer.innerHTML = `<div class="text-center py-10 bg-slate-800/30 rounded-2xl border border-dashed border-slate-700/50"><p class="text-slate-500 text-sm">登録されたフレーズはありません</p><p class="text-xs text-slate-600 mt-2">翻訳結果の ★ ボタンを押して追加できます</p></div>`;
                els.playAllListBtn.classList.add('hidden');
                return;
            }

            els.playAllListBtn.classList.remove('hidden');
            els.studyListContainer.innerHTML = '';
            
            state.studyList.forEach(item => {
                const el = document.createElement('div');
                el.className = 'bg-slate-800/50 border border-slate-700/50 p-4 rounded-xl flex flex-col gap-3 relative transition-colors duration-300';
                el.setAttribute('data-id', item.id);
                
                let contextHtml = item.context ? `<p class="text-[10px] text-amber-400/80 line-clamp-1 mb-1"><i class="fa-solid fa-quote-left mr-1"></i>${item.context}</p>` : '';

                el.innerHTML = `
                    <button class="absolute top-3 right-3 w-8 h-8 rounded-full flex items-center justify-center text-slate-500 hover:text-red-400 hover:bg-red-500/10 transition-colors list-delete-btn" data-id="${item.id}" title="リストから削除">
                        <i class="fa-solid fa-trash-can text-sm"></i>
                    </button>
                    <div class="pr-8">
                        ${contextHtml}
                        <p class="text-xs text-slate-400 font-medium">${item.original}</p>
                    </div>
                    <div class="flex justify-between items-center bg-slate-900/80 p-3 rounded-lg border border-slate-700/50">
                        <div class="list-english-text text-base font-semibold text-slate-100 pr-2 leading-relaxed flex-1"></div>
                        <button class="list-play-btn flex-shrink-0 w-10 h-10 rounded-full bg-blue-600/20 text-blue-400 hover:bg-blue-500 hover:text-white flex items-center justify-center transition-colors shadow-sm" data-text="${item.casual}" data-voice="${item.voiceName}" data-accent="${item.accent}">
                            <i class="fa-solid fa-play"></i>
                        </button>
                    </div>
                    <div class="text-[10px] text-slate-500 flex justify-between items-center">
                        <span class="flex items-center gap-1 bg-slate-900 px-2 py-0.5 rounded-md"><i class="fa-solid fa-robot text-blue-500/70"></i> ${item.voiceName} (${item.accent})</span>
                        <span>${item.date}</span>
                    </div>
                `;
                
                const textContainer = el.querySelector('.list-english-text');
                createClickableText(item.casual, textContainer);
                els.studyListContainer.appendChild(el);
            });

            document.querySelectorAll('.list-play-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const btnEl = e.currentTarget;
                    playTTS(btnEl.dataset.text, 'ai', btnEl.dataset.voice, btnEl.dataset.accent);
                });
            });

            document.querySelectorAll('.list-delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(e.currentTarget.dataset.id);
                    state.studyList = state.studyList.filter(item => item.id !== id);
                    localStorage.setItem('nativeSense_studyList', JSON.stringify(state.studyList));
                    if (state.currentResult) updateSaveBtnState();
                    renderStudyList();
                    showToast('リストから削除しました');
                });
            });
        }


        // ==========================================
        // 8. Analyze & Gemini API
        // ==========================================
        async function handleAnalyze() {
            const text = els.inputText.value.trim();
            const contextText = els.contextInput.value.trim();
            if (!text) {
                showToast('テキストを入力してください', 'error');
                return;
            }

            stopQueue();
            setButtonLoading(els.analyzeBtn, true, 'AIでネイティブ英語に変換', 'fa-solid fa-wand-magic-sparkles');
            
            try {
                let resultObj;
                if (!state.apiKey) {
                    await new Promise(r => setTimeout(r, 1000)); 
                    resultObj = {
                        casual: "Can we change tomorrow's meeting to 10 AM?",
                        business: "Would it be possible to reschedule tomorrow's meeting to 10:00 AM?",
                        advice: "カジュアルでは Can we change... で十分伝わります。ビジネスシーンでは Would it be possible to... と丁寧にお伺いを立てる表現が好まれます。"
                    };
                } else {
                    resultObj = await callGeminiTextAPI(text, contextText);
                }

                state.currentResult = {
                    original: text,
                    context: contextText,
                    casual: resultObj.casual,
                    voiceName: state.aiVoiceName,
                    accent: state.accent
                };

                displayResult(resultObj);
                updateSaveBtnState();
                saveToHistory(text, contextText, resultObj);
                
                setTimeout(() => playTTS(resultObj.casual), 300);

            } catch (error) {
                console.error(error);
                showToast('通信エラーが発生しました。APIキーを確認してください。', 'error');
            } finally {
                setButtonLoading(els.analyzeBtn, false, 'AIでネイティブ英語に変換', 'fa-solid fa-wand-magic-sparkles');
            }
        }

        async function callGeminiTextAPI(inputText, contextText) {
            let systemPrompt = `You are an excellent English tutor. The user will provide a Japanese phrase or broken English. 
Provide a "casual" natural native expression, a "business" polite expression, and a 1-2 sentence "advice" in Japanese explaining the nuances or word choices.`;
            
            if (contextText) systemPrompt += `\n\nTranslation Context / Rules:\n${contextText}`;

            const payload = {
                contents: [{ parts: [{ text: inputText }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            casual: { type: "STRING", description: "Casual natural expression" },
                            business: { type: "STRING", description: "Polite business expression" },
                            advice: { type: "STRING", description: "Japanese advice (1-2 sentences)" }
                        },
                        required: ["casual", "business", "advice"]
                    }
                }
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${state.apiKey}`;
            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!response.ok) throw new Error('API failed');
            
            const result = await response.json();
            const textContent = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!textContent) throw new Error('No content');
            
            return JSON.parse(textContent);
        }

        function displayResult(data) {
            createClickableText(data.casual, els.casualText);
            createClickableText(data.business, els.businessText);
            els.adviceText.textContent = data.advice;
            
            els.resultSection.classList.remove('hidden');
            els.resultSection.classList.remove('animate-fade-in');
            void els.resultSection.offsetWidth; 
            els.resultSection.classList.add('animate-fade-in');
        }

        function saveToHistory(original, context, data) {
            const newItem = {
                id: Date.now(),
                original: original,
                context: context,
                casual: data.casual,
                business: data.business,
                advice: data.advice,
                date: new Date().toLocaleDateString('ja-JP')
            };

            state.history.unshift(newItem);
            if (state.history.length > 15) state.history.pop(); 
            
            localStorage.setItem('nativeSense_history', JSON.stringify(state.history));
            renderHistory();
        }

        function renderHistory() {
            if (state.history.length === 0) {
                els.historyList.innerHTML = `<p class="text-slate-500 text-sm text-center py-4 bg-slate-800/30 rounded-xl border border-dashed border-slate-700">履歴はまだありません</p>`;
                els.clearHistoryBtn.classList.add('hidden');
                els.playAllHistoryBtn.classList.add('hidden');
                return;
            }

            els.clearHistoryBtn.classList.remove('hidden');
            els.playAllHistoryBtn.classList.remove('hidden');
            els.historyList.innerHTML = '';
            
            state.history.forEach(item => {
                const el = document.createElement('div');
                el.className = 'bg-slate-800/50 border border-slate-700/50 p-4 rounded-xl flex flex-col gap-2 relative transition-colors duration-300';
                el.setAttribute('data-id', item.id);
                
                let contextHtml = item.context ? `<p class="text-[10px] text-amber-400/80 line-clamp-1 mb-1"><i class="fa-solid fa-quote-left mr-1"></i>${item.context}</p>` : '';

                el.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <div class="flex-1 pr-4">
                            ${contextHtml}
                            <p class="text-xs text-slate-400 font-medium line-clamp-1" title="${item.original}">${item.original}</p>
                        </div>
                        <span class="text-[10px] text-slate-500">${item.date}</span>
                    </div>
                    
                    <div class="flex justify-between items-center bg-slate-900/50 p-2.5 rounded-lg border border-slate-800">
                        <div class="history-casual-text text-sm font-medium text-slate-200 pr-2 leading-relaxed flex-1"></div>
                        <button class="history-play-btn flex-shrink-0 w-8 h-8 rounded-full bg-slate-700 text-slate-300 hover:bg-blue-600 hover:text-white flex items-center justify-center transition-colors" data-text="${item.casual}">
                            <i class="fa-solid fa-play text-xs"></i>
                        </button>
                    </div>
                `;
                
                const textContainer = el.querySelector('.history-casual-text');
                createClickableText(item.casual, textContainer);
                els.historyList.appendChild(el);
            });

            document.querySelectorAll('.history-play-btn').forEach(btn => {
                btn.addEventListener('click', (e) => playTTS(e.currentTarget.dataset.text));
            });
        }

        // ==========================================
        // 9. Dictionary Tooltip & Helpers
        // ==========================================
        function createClickableText(text, element) {
            element.innerHTML = '';
            const parts = text.split(/([a-zA-Z0-9'-]+)/);
            
            parts.forEach(part => {
                if (/^[a-zA-Z0-9'-]+$/.test(part)) {
                    const span = document.createElement('span');
                    span.textContent = part;
                    span.className = 'cursor-pointer transition-colors border-b border-slate-500/40 border-dashed hover:text-blue-300 hover:border-blue-400';
                    span.addEventListener('click', (e) => handleWordClick(e, part));
                    element.appendChild(span);
                } else if (part) {
                    element.appendChild(document.createTextNode(part));
                }
            });
        }

        async function handleWordClick(e, word) {
            e.stopPropagation(); 
            const cleanWord = word.toLowerCase().replace(/[^a-z0-9'-]/g, '');
            if (!cleanWord) return;

            const tooltip = els.wordTooltip;
            tooltip.innerHTML = `<div class="flex items-center gap-2"><div class="loader" style="width:16px;height:16px;border-width:2px;"></div><span>検索中...</span></div>`;
            positionTooltip(tooltip, e.target);

            if (wordDictionaryCache.has(cleanWord)) {
                showTooltipContent(word, wordDictionaryCache.get(cleanWord));
                return;
            }

            if (!state.apiKey) {
                showTooltipContent(word, "（デモ翻訳）");
                return;
            }

            try {
                const trans = await translateWordAPI(cleanWord);
                wordDictionaryCache.set(cleanWord, trans);
                showTooltipContent(word, trans);
            } catch(error) {
                console.error(error);
                showTooltipContent(word, "翻訳エラー");
            }
        }

        function showTooltipContent(originalWord, translatedText) {
            els.wordTooltip.innerHTML = `
                <div class="flex flex-col items-center">
                    <span class="text-[10px] text-slate-400 font-mono tracking-wider mb-0.5">${originalWord.toLowerCase()}</span>
                    <span class="font-bold text-base text-white">${translatedText}</span>
                </div>
            `;
            clearTimeout(tooltipTimeout);
            tooltipTimeout = setTimeout(() => els.wordTooltip.classList.add('hidden'), 4000);
        }

        function positionTooltip(tooltip, targetElement) {
            tooltip.classList.remove('hidden');
            const rect = targetElement.getBoundingClientRect();
            let top = rect.top - tooltip.offsetHeight - 12;
            let left = rect.left + (rect.width / 2) - (tooltip.offsetWidth / 2);
            
            if (top < 10) top = rect.bottom + 12; 
            if (left < 10) left = 10; 
            if (left + tooltip.offsetWidth > window.innerWidth - 10) left = window.innerWidth - tooltip.offsetWidth - 10; 
            
            tooltip.style.top = `${top}px`;
            tooltip.style.left = `${left}px`;
        }

        async function translateWordAPI(word) {
            const systemPrompt = `あなたは優秀な英和辞典です。入力された英単語に対する最も一般的な「日本語の意味」を1つだけ、簡潔に回答してください。（最大10文字程度。発音記号や解説、不要な記号は一切含めないこと。）`;
            const payload = {
                contents: [{ parts: [{ text: word }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: { temperature: 0.1 }
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${state.apiKey}`;
            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!response.ok) throw new Error('API Error');
            const result = await response.json();
            return result.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "不明";
        }

        // --- Mic Control ---
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                speechRecognition = new SpeechRecognition();
                speechRecognition.lang = 'ja-JP';
                speechRecognition.interimResults = false;
                speechRecognition.maxAlternatives = 1;

                speechRecognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    const currentText = els.inputText.value;
                    els.inputText.value = currentText + (currentText ? ' ' : '') + transcript;
                    els.charCount.textContent = `${els.inputText.value.length} / 200`;
                    stopRecording();
                };

                speechRecognition.onerror = (event) => {
                    stopRecording();
                    showToast(`音声入力エラー: ${event.error}`, 'error');
                };

                speechRecognition.onend = stopRecording;
                els.micBtn.addEventListener('click', toggleRecording);
            } else {
                els.micBtn.style.display = 'none'; 
            }
        }

        function toggleRecording() {
            if (!speechRecognition) return;
            if (isRecording) {
                speechRecognition.stop();
            } else {
                stopQueue(); 
                try {
                    speechRecognition.start();
                    isRecording = true;
                    els.micBtn.classList.remove('bg-slate-800', 'text-blue-400', 'border-slate-700', 'hover:border-slate-600');
                    els.micBtn.classList.add('bg-red-500', 'text-white', 'border-red-400', 'animate-pulse');
                    els.micBtn.innerHTML = '<i class="fa-solid fa-stop text-lg flex-shrink-0"></i><span class="font-medium text-sm">音声入力中... (タップで停止)</span>';
                    showToast('音声入力中...', 'info');
                } catch (e) {
                    showToast('マイクにアクセスできませんでした', 'error');
                }
            }
        }

        function stopRecording() {
            isRecording = false;
            els.micBtn.classList.remove('bg-red-500', 'text-white', 'border-red-400', 'animate-pulse');
            els.micBtn.classList.add('bg-slate-800', 'text-blue-400', 'border-slate-700', 'hover:border-slate-600');
            els.micBtn.innerHTML = '<i class="fa-solid fa-microphone text-lg flex-shrink-0"></i><span class="font-medium text-sm">音声でテキストを入力</span>';
        }

        // --- Audio format helpers ---
        function pcmToWav(pcmData, sampleRate) {
            const numChannels = 1;
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const dataSize = pcmData.length * 2;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            const writeString = (view, offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };

            writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + dataSize, true); writeString(view, 8, 'WAVE'); writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true); view.setUint32(28, byteRate, true); view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true); writeString(view, 36, 'data'); view.setUint32(40, dataSize, true);

            let offset = 44;
            for (let i = 0; i < pcmData.length; i++, offset += 2) view.setInt16(offset, pcmData[i], true);
            return new Blob([buffer], { type: 'audio/wav' });
        }

        function base64ToArrayBuffer(base64) {
            const binary_string = window.atob(base64);
            const len = binary_string.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binary_string.charCodeAt(i);
            return bytes.buffer;
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
